<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TODOアプリ</title>
    <link rel="stylesheet" href="style.css">
    <script>
        window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
    </script>
    <script defer src="/_vercel/insights/script.js"></script>
</head>
<body>
    <div class="container">
        <h1>TODO</h1>
        <form id="todoForm" class="input-area">
            <input type="text" id="todoInput" placeholder="新しいタスクを入力..." autocomplete="off">
            <button type="submit">追加</button>
        </form>
        <div class="filters">
            <button class="filter active" data-filter="all">すべて</button>
            <button class="filter" data-filter="active">未完了</button>
            <button class="filter" data-filter="completed">完了済み</button>
        </div>
        <ul id="todoList"></ul>
        <div class="footer">
            <span id="remaining">0</span>件の未完了タスク
            <button id="clearCompleted" class="clear-btn" hidden>完了済みを削除</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
